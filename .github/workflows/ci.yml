name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templ
        run: templ generate
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  generate-check:
    name: Check Generated Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - name: Generate templ
        run: templ generate
      - name: Check templ is up to date
        run: git diff --exit-code
      - name: Generate sqlc
        run: sqlc generate
      - name: Check sqlc is up to date
        run: git diff --exit-code

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gotha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: Generate templ
        run: templ generate
      - name: Run migrations
        run: goose -dir internal/db/migrations postgres "postgres://postgres:postgres@localhost:5432/gotha_test?sslmode=disable" up
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/gotha_test?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./... -v -count=1 -race

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, generate-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@latest
      - name: Generate templ
        run: templ generate
      - name: Build
        run: go build ./...
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t gotha-boilerplate .
